name: nocterm
description: A Flutter-like framework for building rich terminal user interfaces with components, state management, animations, and more.
version: 0.6.0
repository: https://github.com/Norbert515/nocterm
homepage: https://docs.nocterm.dev
documentation: https://docs.nocterm.dev

topics:
  - tui
  
environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  ansi_escape_codes: ^2.0.3
  characters: ^1.3.0
  crypto: ^3.0.3
  ffi: ^2.1.4
  hotreloader: ^4.2.0
  watcher: ^1.1.0
  image: ^4.5.4
  markdown: ^7.2.0
  dart_markdown_parser: ^0.1.1 
  highlight: ^0.7.0
  path: ^1.9.0

  # TODO put this into a separate testing package
  matcher: ^0.12.17

  # XTerm dependencies
  convert: ^3.0.0
  meta: ^1.3.0
  quiver: ^3.0.0
  equatable: ^2.0.3
  zmodem: ^0.0.6

dev_dependencies:
  test: ^1.25.6
  hooksman: ^3.1.1
  lints: ^5.0.0
  melos: ^6.3.2
